<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .login-box{
      background:white;
      padding:30px;
      width:350px;
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#007bff;
      border:none;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    p{
      text-align:center;
      margin-top:15px;
    }

    a{
      text-decoration:none;
      color:#007bff;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <h2>Login</h2>

    <form>

      <input 
        type="email" 
        placeholder="Enter Email"
        required
      >

      <input 
        type="password"
        placeholder="Enter Password"
        required
      >

      <button type="submit">Login</button>

    </form>

    <p>
      Don't have an account?
      <a href="register.html">Register</a>
    </p>

  </div>
</body>
</html>
